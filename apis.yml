name: Google Cloud Text-to-Speech
description: >-
  Google Cloud Text-to-Speech converts text or Speech Synthesis Markup Language
  (SSML) input into audio data of natural human speech. It provides access to
  hundreds of voices across multiple languages and variants, powered by
  DeepMind's WaveNet technology and Google's neural network models.
